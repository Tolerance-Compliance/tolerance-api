app = 'tolerance-api'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

  [[http_service.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[http_service.ports]]
    handlers = ["tls", "http"]
    port = 443

[scale]
  count = 1
  memory_mb = 512
  max_per_region = 1

[deploy]
  strategy = "rolling"
  placement = {regions = ["iad"]}

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
